<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dals-Eds översiktsplan nu-2050</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nav-h:#002d4f;--accent:#0072C6;--accent2:#66AADC;
  --forest:#336610;--forest2:#336610;--forest3:#56AA1C;
  --light:#e5f0f9;--text:#001627;--muted:#004f8a;
  --border:#cce2f3;--card:#fff;--gold:#0072C6;
}
body{font-family:Georgia,serif;background:#fff;color:var(--text);line-height:1.6}
nav.topnav{background:var(--nav-h);display:flex;align-items:stretch;padding:0 0 0 1.5rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.35)}
.nav-brand{display:flex;align-items:center;gap:12px;padding:6px 1.5rem 6px 0;border-right:1px solid rgba(255,255,255,.15);flex-shrink:0;cursor:pointer}
.nav-brand img{height:36px;width:auto}
.nav-brand-text{display:flex;flex-direction:column;line-height:1.2}
.nav-brand-text span:first-child{color:var(--accent2);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.nav-brand-text span:last-child{color:#fff;font-size:13px;font-weight:600}
.nav-tabs{display:flex;flex:1;overflow-x:auto}
.nav-tab{color:rgba(255,255,255,.65);font-size:13px;padding:0 18px;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;height:52px;display:flex;align-items:center}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.07)}
.nav-tab.active{color:#fff;border-bottom-color:var(--accent2)}
.nav-right{margin-left:auto;display:flex;align-items:center;padding:0 1rem;flex-shrink:0}
.btn-karta{background:var(--forest2);color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:4px;border:none;cursor:pointer}
.hero{position:relative;height:260px;overflow:hidden;display:flex;align-items:flex-end;flex-shrink:0}
.hero-bg{position:absolute;inset:0}
.hero-water{position:absolute;bottom:0;left:0;right:0;height:100px}
.hero-content{position:relative;z-index:2;padding:2rem 2.5rem;max-width:700px}
.hero-eyebrow{color:var(--accent2);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:.4rem}
.hero-title{color:#fff;font-size:30px;font-weight:300;line-height:1.2}
.hero-title strong{font-weight:700}
.hero-vapen{position:absolute;bottom:1.5rem;right:2rem;z-index:3;opacity:.18;height:110px}
nav.subnav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:190;display:flex}
.subnav-inner{display:flex;overflow-x:auto;flex:1;padding:0 1.5rem;scrollbar-width:none}
.subnav-inner::-webkit-scrollbar{display:none}
.subnav-tab{color:var(--muted);font-size:13px;padding:0 18px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;height:44px;display:flex;align-items:center;transition:all .15s;flex-shrink:0}
.subnav-tab:hover{color:var(--text)}
.subnav-tab.active{color:var(--text);border-bottom-color:var(--accent2);font-weight:600}
.subnav-arrow{width:36px;background:#fff;border:none;cursor:pointer;color:var(--muted);font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border)}
.content-area{max-width:860px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
.section-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:.3rem}
h1.page-title{font-size:28px;font-weight:400;color:var(--text);margin-bottom:.75rem;line-height:1.3}
h1.page-title strong{font-weight:700}
.ingress{font-size:17px;font-weight:600;color:var(--text);line-height:1.6;margin-bottom:1.5rem;max-width:700px}
.body-text{font-size:15px;color:#001627;line-height:1.8;margin-bottom:1.25rem;max-width:700px}
h2.section-h{font-size:20px;font-weight:600;margin:2rem 0 .6rem;color:var(--text)}
.gold-rule{border:none;border-top:2px solid var(--gold);width:80px;margin:0 0 2rem}
.ulist{margin:0 0 1.25rem 1.5rem;max-width:680px}
.ulist li{font-size:15px;color:#001627;line-height:1.8;margin-bottom:.4rem}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:1.5rem 0}
.info-card{background:var(--light);border:0.5px solid var(--border);border-radius:10px;padding:1.25rem}
.info-card-num{font-size:30px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:.3rem}
.info-card-title{font-size:13px;font-weight:600;margin-bottom:.25rem}
.info-card-desc{font-size:12px;color:var(--muted);line-height:1.5}
.strat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1.5rem 0}
.strat-card{background:#fff;border:1.5px solid var(--accent2);border-radius:10px;padding:1.25rem}
.strat-card-icon{font-size:24px;margin-bottom:.5rem}
.strat-card-title{font-size:15px;font-weight:600;margin-bottom:.4rem}
.strat-card-text{font-size:13px;color:var(--muted);line-height:1.6}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:3px;margin:3px 3px 3px 0;font-weight:500}
.tag.green{background:#e4f0e8;color:#336610}
.tag.blue{background:#dceefa;color:#002d4f}
.tag.gold{background:#fff3cd;color:#7a5000}
.ort-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:1.5rem 0}
.ort-card{background:#fff;border:0.5px solid var(--border);border-radius:8px;padding:1rem 1.1rem;cursor:pointer;transition:border-color .15s}
.ort-card:hover{border-color:var(--accent2)}
.ort-name{font-size:14px;font-weight:600;margin-bottom:.15rem}
.ort-type{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.ort-pills{display:flex;flex-wrap:wrap;gap:3px}
.pill{font-size:11px;padding:2px 6px;border-radius:10px;background:#f0f5f8;color:var(--muted)}
.pill.lis{background:#dceefa;color:#002d4f}
.vision-box{background:#002d4f;border-radius:10px;padding:2rem;margin-bottom:2rem;color:#fff}
.vision-q{font-size:19px;font-weight:400;color:rgba(255,255,255,.95);line-height:1.55;margin-bottom:.6rem;font-style:italic}
.vision-src{font-size:11px;color:var(--accent2);letter-spacing:.07em;text-transform:uppercase}
.doc-item{background:#fff;border:0.5px solid var(--border);border-radius:8px;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;margin-bottom:.6rem}
.doc-item.pending{opacity:.5}
.doc-icon{font-size:22px;flex-shrink:0}
.doc-title{font-size:14px;font-weight:600;color:var(--text)}
.doc-desc{font-size:12px;color:var(--muted);margin-top:.2rem}
.note{background:#fff8e1;border-left:3px solid #d4a843;padding:.75rem 1rem;font-size:13px;color:#7a5000;line-height:1.6;margin:1rem 0 1.25rem;max-width:700px;font-style:italic}
hr.rule{border:none;border-top:0.5px solid var(--border);margin:2rem 0}

/* LOADING */
#loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;font-style:italic}

/* EDITOR */
#edit-bar{display:none;background:#fffbea;border-bottom:2px solid #d4a843;padding:.6rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:96px;z-index:180}
#edit-bar.hidden{display:none}
#edit-bar span{font-size:13px;color:#7a5000;font-weight:600}
.edit-btn{font-size:12px;padding:5px 12px;border-radius:4px;border:none;cursor:pointer;font-family:Georgia,serif}
.edit-btn.primary{background:var(--accent);color:#fff}
.edit-btn.secondary{background:#fff;color:var(--muted);border:1px solid var(--border)}
.edit-btn.danger{background:#cc0000;color:#fff}
#editor-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
#editor-modal.open{display:flex}
.editor-box{background:#fff;border-radius:10px;width:min(860px,95vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.editor-header{background:var(--nav-h);color:#fff;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.editor-header h3{font-size:15px;font-weight:600}
.editor-body{flex:1;overflow-y:auto;padding:1.5rem}
.editor-body label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.4rem;margin-top:1rem}
.editor-body label:first-child{margin-top:0}
.editor-body input[type=text]{width:100%;padding:.5rem .75rem;border:1px solid var(--border);border-radius:6px;font-family:Georgia,serif;font-size:14px;color:var(--text)}
.editor-body textarea{width:100%;padding:.75rem;border:1px solid var(--border);border-radius:6px;font-family:Georgia,serif;font-size:13px;color:var(--text);line-height:1.6;resize:vertical;min-height:300px}
.editor-hint{font-size:11px;color:#888;margin-top:.3rem;font-style:italic}
.editor-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end}

/* EDIT MODE toggle */
body.edit-mode .content-area:hover{outline:2px dashed var(--accent2)}
</style>
</head>

    <div class="editor-body">
      <label>Flikrubrik (visas i undermenyn)</label>
      <input type="text" id="ed-label">
      <label>Innehåll (HTML)</label>
      <textarea id="ed-content"></textarea>
      <p class="editor-hint">Tips: Använd &lt;h2 class="section-h"&gt; för rubriker, &lt;p class="body-text"&gt; för brödtext, &lt;p class="ingress"&gt; för ingresstext.</p>
    </div>
    <div class="editor-footer">
      <button class="edit-btn secondary" onclick="closeEditor()">Avbryt</button>
      <button class="edit-btn primary" onclick="savePage()">Spara ändringar</button>
    </div>
  </div>
</div>

<script>
let pages = {};
let currentMain = 'start';
let currentSub = null;
let editMode = false;

// ── LOAD JSON ────────────────────────────────────────────────────────────────
async function loadPages() {
  try {
    // Try loading from file first
    const resp = await fetch('plantexter.json');
    if (resp.ok) {
      pages = await resp.json();
    } else {
      throw new Error('File not found');
    }
  } catch(e) {
    // Fall back to localStorage if available
    const stored = localStorage.getItem('dalsed_plantexter');
    if (stored) {
      pages = JSON.parse(stored);
      console.log('Loaded from localStorage');
    } else {
      document.getElementById('loading').textContent = 
        'Kunde inte ladda plantexter.json – kontrollera att filen finns i samma mapp.';
      return;
    }
  }
  buildNav();
  showMain('start');
}

// ── BUILD TOP NAV ─────────────────────────────────────────────────────────────
function buildNav() {
  const tabsEl = document.getElementById('main-tabs');
  tabsEl.innerHTML = '';
  const order = ['start','strategi','stallningstaganden','mark','hansyn','mkb'];
  order.forEach(id => {
    if (!pages[id]) return;
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (id === 'start' ? ' active' : '');
    btn.id = 'mtab-' + id;
    btn.textContent = pages[id].label;
    btn.onclick = () => showMain(id, btn);
    tabsEl.appendChild(btn);
  });
}

// ── SHOW MAIN PAGE ────────────────────────────────────────────────────────────
function showMain(id, btn) {
  currentMain = id;
  const p = pages[id]; if (!p) return;

  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else { const t = document.getElementById('mtab-'+id); if(t) t.classList.add('active'); }

  document.getElementById('hero-title').innerHTML = p.heroTitle;
  document.getElementById('hero-bg').style.background = p.heroBg;

  const inner = document.getElementById('subnav-inner');
  inner.innerHTML = '';
  p.subs.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'subnav-tab' + (i === 0 ? ' active' : '');
    b.textContent = s.label;
    b.onclick = () => showSub(id, s.id, b);
    inner.appendChild(b);
  });

  showSub(id, p.subs[0].id, inner.children[0]);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── SHOW SUB PAGE ─────────────────────────────────────────────────────────────
function showSub(mainId, subId, btn) {
  const p = pages[mainId];
  const s = p.subs.find(x => x.id === subId); if (!s) return;
  currentSub = subId;

  document.querySelectorAll('.subnav-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');

  document.getElementById('content-area').innerHTML = s.content;
}

function scrollSubnav(delta) {
  document.getElementById('subnav-inner').scrollBy({ left: delta, behavior: 'smooth' });
}

// ── EDIT MODE ─────────────────────────────────────────────────────────────────
function toggleEditMode() {
  editMode = !editMode;
  const bar = document.getElementById('edit-bar');
  const btn = document.getElementById('toggle-edit');
  if (editMode) {
    bar.classList.remove('hidden');
    btn.style.background = '#d4a843';
    btn.style.color = '#001627';
    document.body.classList.add('edit-mode');
  } else {
    bar.classList.add('hidden');
    btn.style.background = '';
    btn.style.color = '';
    document.body.classList.remove('edit-mode');
  }
}

function openEditor() {
  const p = pages[currentMain];
  const s = p.subs.find(x => x.id === currentSub);
  if (!s) return;

  document.getElementById('editor-title').textContent =
    'Redigera: ' + p.label + ' › ' + s.label;
  document.getElementById('ed-label').value = s.label;
  document.getElementById('ed-content').value = s.content;
  document.getElementById('editor-modal').classList.add('open');
}

function closeEditor() {
  document.getElementById('editor-modal').classList.remove('open');
}

function savePage() {
  const p = pages[currentMain];
  const s = p.subs.find(x => x.id === currentSub);
  if (!s) return;

  s.label = document.getElementById('ed-label').value;
  s.content = document.getElementById('ed-content').value;

  // Save to localStorage as backup
  localStorage.setItem('dalsed_plantexter', JSON.stringify(pages));

  // Update display
  const inner = document.getElementById('subnav-inner');
  const activBtn = inner.querySelector('.subnav-tab.active');
  if (activBtn) activBtn.textContent = s.label;
  document.getElementById('content-area').innerHTML = s.content;

  closeEditor();

  // Show save confirmation
  const bar = document.getElementById('edit-bar');
  const orig = bar.querySelector('span').textContent;
  bar.querySelector('span').textContent = '✅ Sparat! (ladda ner texter.json för att bevara ändringarna)';
  setTimeout(() => { bar.querySelector('span').textContent = orig; }, 4000);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(pages, null, 2)], 
    { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'plantexter.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadPages();

// Hemlig genväg: Ctrl+Shift+E aktiverar redigeringsläge
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && (e.key === 'E' || e.key === 'e')) {
    e.preventDefault();
    const btn = document.getElementById('toggle-edit');
    btn.style.display = btn.style.display === 'none' ? 'inline-block' : 'none';
    toggleEditMode();
  }
});
</script>
</body>
</html>
